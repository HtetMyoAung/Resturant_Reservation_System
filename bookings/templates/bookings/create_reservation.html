<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table - Restaurant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="max-width: 450px; width: 100%;">
        <h2 class="text-center text-primary mb-4">Table Reservation</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <!-- Date Input -->
            <div class="mb-3">
                <label for="reserved_date" class="form-label fw-bold">Reservation Date</label>
                <input type="date" id="reserved_date" name="reserved_date" class="form-control" required>
            </div>
            
          
            <div class="mb-3">
                <label for="reserved_time" class="form-label fw-bold">Reservation Time</label>
                <input type="time" id="reserved_time" name="reserved_time" class="form-control" required>
            </div>
            
    
            <div class="mb-4">
                <label for="number_of_guests" class="form-label fw-bold">Number of Guests</label>
                <input type="number" id="number_of_guests" name="number_of_guests" class="form-control" min="1" placeholder="e.g. 4" required>
            </div>
            
         
            <button type="submit" class="btn btn-primary w-100 fw-bold">Submit Reservation</button>
        </form>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
